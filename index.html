<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROTOKOL 17</title>

<style>
body{
    margin:0;
    background:#0d0d0d;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:90%;
    max-width:420px;
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:18px;
    padding:35px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,.5);
}

h1{
    margin:0;
    letter-spacing:4px;
    font-size:32px;
}

.line{
    width:70px;
    height:3px;
    background:#3cff88;
    margin:20px auto;
}

.info{
    color:#bdbdbd;
    margin:12px 0;
}

button{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:10px;
    background:#3cff88;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    transform:scale(1.05);
}

#mission{
    display:none;
}

.mission-title{
    color:#3cff88;
    margin-bottom:20px;
}
</style>
</head>

<body>

<div class="card" id="home">

<h1>PROTOKOL 17</h1>

<div class="line"></div>

<p class="info">DOSYA NO: 001</p>

<p class="info">KOD ADI: <b>BALKAN</b></p>

<p class="info">HEDEF: <b>BERRA ALKAN</b></p>

<button onclick="startMission()">DOSYAYI AÇ</button>

</div>

<div class="card" id="mission">

<h2 class="mission-title">GÖREV 001</h2>

<p>
AĞ VARDIR,<br><br>
AMA BALIK TUTULMAZ.<br><br>

SERVİS VARDIR,<br><br>
AMA GARSON BULUNMAZ.<br><br>

SMAÇ VARDIR,<br><br>
AMA KAVGA EDİLMEZ.
</p>

<h2 style="margin-top:30px;">NEREDEYİM?</h2>

</div>

<script>
function startMission(){
document.getElementById("home").style.display="none";
document.getElementById("mission").style.display="block";
}
</script>

</body>
</html>
