<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PROTOKOL 17 // AUTHORIZED ACCESS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:#060606;

overflow:hidden;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

color:white;

}

#background{

position:fixed;

width:100%;

height:100%;

background:
radial-gradient(circle at top,#141414,#050505);

z-index:-2;

}

#noise{

position:fixed;

width:100%;
height:100%;

opacity:.03;

background-image:url("https://www.transparenttextures.com/patterns/asfalt-dark.png");

z-index:-1;

}

.card{

width:92%;

max-width:430px;

padding:35px;

border-radius:24px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 20px 60px rgba(0,0,0,.6);

animation:fade 1.4s ease;

}

.logo{

text-align:center;

font-size:13px;

letter-spacing:6px;

opacity:.6;

margin-bottom:20px;

}

.logo h1{

font-size:42px;

letter-spacing:2px;

margin-top:8px;

font-weight:700;

}

.loading{

margin-top:35px;

height:8px;

background:#111;

border-radius:20px;

overflow:hidden;

}

.bar{

height:100%;

width:0%;

background:#35ff74;

animation:load 3s forwards;

}

.status{

margin-top:22px;

font-size:14px;

line-height:30px;

opacity:.9;

}

.hidden{

display:none;

}

@keyframes load{

0%{width:0}

100%{width:100%}

}

@keyframes fade{

from{

opacity:0;

transform:translateY(25px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<div id="background"></div>

<div id="noise"></div>

<div class="card" id="boot">

<div class="logo">

▲

<h1>PROTOKOL 17</h1>

</div>

<div style="text-align:center;opacity:.7;margin-top:15px">

GÜVENLİ ERİŞİM BAŞLATILIYOR

</div>

<div class="loading">

<div class="bar"></div>

</div>

<div class="status" id="status">

<div>• BAĞLANTI KURULUYOR...</div>

</div>

</div>

<script>

const status=document.getElementById("status");

setTimeout(()=>{
status.innerHTML+=`<div>✓ BAĞLANTI KURULDU</div>`;
},900);

setTimeout(()=>{
status.innerHTML+=`<div>✓ KİMLİK DOĞRULANDI</div>`;
},1700);

setTimeout(()=>{
status.innerHTML+=`<div>✓ DOSYA BULUNDU</div>`;
},2500);

</script>

</body>

</html>
